<!DOCTYPE html>
<html>
<head>
  <title>Caza Estrellas</title>
  <link rel="stylesheet" href="limones.css"/>
  <script src="utils.js"></script>

</head>
<body onload="iniciar()">
  <div class="logo-container">
    <img src="logo.png" alt="Logo" class="logo-image">
  </div>
  
  <div class="contenedor">
    <div class="header-game">
      <h1>🍋 Atrapar Limones 🍋</h1>
      <p class="subtitle">Si del cielo te caen limones ..... </p>
      <h2 class="author">Autor: Melany Nono</h2>
    </div>
    
    <div class="game-wrapper">
      <canvas id="areaJuego" width="600" height="400"></canvas>
    </div>
    
    <div class="panel">
      <div class="stat-box">
        <div class="stat-icon">🎯</div>
        <div class="stat-content">
          <span class="stat-label">Puntaje</span>
          <span class="stat-value" id="txtPuntaje">0</span>
        </div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">❤️</div>
        <div class="stat-content">
          <span class="stat-label">Vidas</span>
          <span class="stat-value" id="txtVidas">3</span>
        </div>
      </div>
    </div>
    
    <div class="botones">
      <button class="btn-control btn-left" onclick="moverIzquierda();">⬅️ Izquierda</button>
      <button class="btn-control btn-right" onclick="moverDerecha();">Derecha ➡️</button>
      <button class="btn-restart" onclick="reiniciar();">🔄 Reiniciar</button>
      <button class="btn-restart" onclick="desaparcerPersonaje();">Desaparecer</button>
    </div>
  </div>

  <script src="limones.js"></script>
  

</body>
</html>
